<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario PRO</title>

<style>
body { font-family:-apple-system; background:#f2f2f7; padding:15px; }
h1 { text-align:center; }
.box { background:white; padding:15px; border-radius:20px; margin-top:15px; }
button { width:100%; padding:12px; border-radius:12px; background:black; color:white; border:none; margin-top:8px; }
input,select { width:100%; padding:10px; margin-top:8px; border-radius:10px; }
li { padding:10px; border-radius:10px; margin-top:6px; }
.lista { background:#e0f0ff; }
.check { background:#e0ffe0; }
</style>
</head>

<body>

<h1 id="titulo">Inventario PRO</h1>

<select id="lang">
<option value="es">Español</option>
<option value="en">English</option>
</select>

<button id="btnVolver">⬅ Volver</button>

<div class="box">
<h3 id="tPush">🔔 Notificaciones</h3>
<button id="bPush">Activar</button>
</div>

<div class="box">
<h3 id="tCrear">📁 Crear Lista</h3>
<input id="nombreLista" placeholder="Nombre">
<select id="tipoLista">
<option value="lista">Lista</option>
<option value="checklist">Checklist</option>
</select>
<button id="bCrear">Crear</button>
</div>

<div class="box">
<h3 id="tListas">📂 Listas</h3>
<ul id="listas"></ul>
</div>

<div class="box">
<h3 id="itemsTitulo">🧾 Items</h3>
<input id="itemTexto" placeholder="Item">
<input id="itemCantidad" type="number" placeholder="Cantidad">
<button id="bAgregar">Agregar</button>
<ul id="items"></ul>
</div>

<div class="box">
<h3 id="tSchedule">⏰ Schedule</h3>
<input id="tituloHora" placeholder="Ej: Llenar inventario">
<input id="hora" type="time">
<button id="bGuardar">Guardar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getMessaging, getToken, onMessage
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBpWDSAOYjkaJCSjpkzcIy2PuPKCLvwGWE",
  authDomain: "inventario-app-bf9af.firebaseapp.com",
  projectId: "inventario-app-bf9af",
  storageBucket: "inventario-app-bf9af.firebasestorage.app",
  messagingSenderId: "737450804732",
  appId: "1:737450804732:web:1e9ae74a1d9e8ecd2c1e79"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const messaging = getMessaging(app);

// 🔐 MODO
const params = new URLSearchParams(window.location.search);
const modo = params.get("modo") || "admin";

// UI
if(modo !== "admin"){
  document.getElementById("btnVolver").style.display = "none";
}

// 🌎 IDIOMA
const textos = {
  es:{titulo:"Inventario PRO",crear:"Crear Lista",listas:"Listas",items:"Items",agregar:"Agregar",guardar:"Guardar",push:"Activar Notificaciones",schedule:"Horario"},
  en:{titulo:"Inventory PRO",crear:"Create List",listas:"Lists",items:"Items",agregar:"Add",guardar:"Save",push:"Enable Notifications",schedule:"Schedule"}
};

function aplicarIdioma(lang){
  titulo.innerText = textos[lang].titulo;
  tPush.innerText="🔔 "+textos[lang].push;
  tCrear.innerText="📁 "+textos[lang].crear;
  tListas.innerText="📂 "+textos[lang].listas;
  itemsTitulo.innerText="🧾 "+textos[lang].items;
  tSchedule.innerText="⏰ "+textos[lang].schedule;

  bPush.innerText=textos[lang].push;
  bCrear.innerText=textos[lang].crear;
  bAgregar.innerText=textos[lang].agregar;
  bGuardar.innerText=textos[lang].guardar;
}
lang.addEventListener("change",e=>aplicarIdioma(e.target.value));

// 🔔 PUSH
async function activarPush(){
  const permiso = await Notification.requestPermission();
  if(permiso!=="granted") return;
  if ('serviceWorker'in navigator){
    await  navigator.serviceWorker.register('/
  firebase-messaging-sw.js');
  }
const token = await getToken(messaging, {
  vapidKey: "BBu_WLDUtd1L2oXJrFCPfCsVGZBcZzaX-uS7RPxs441HyJtChb1FcLTOhmOs0qAQWKv-OV01NFRBQtLG1tNIPog"
});
 
  console.log("TOKEN:",token);

  await addDoc(collection(db,"tokens"),{token});
}
onMessage(messaging,p=>{
  new Notification(p.notification.title,{body:p.notification.body});
});

// 📁 LISTAS
let listaActiva=null, tipoActual=null;

async function crearLista(){
  if(modo!=="admin") return;

  const nombre=nombreLista.value;
  const tipo=tipoLista.value;

  const ref=await addDoc(collection(db,"listas"),{nombre,tipo});
  listaActiva=ref.id;
}

onSnapshot(collection(db,"listas"),snap=>{
  listas.innerHTML="";
  snap.forEach(d=>{
    const data=d.data();
    const li=document.createElement("li");
    li.innerText=data.nombre;

    li.onclick=()=>{
      listaActiva=d.id;
      tipoActual=data.tipo;
      itemsTitulo.innerText="🧾 "+data.nombre;
      cargarItems();
    };

    listas.appendChild(li);
  });
});

// ➕ ITEM
async function agregarItem(){
  if(modo!=="admin") return;

  await addDoc(collection(db,"listas",listaActiva,"items"),{
    texto:itemTexto.value,
    cantidad:itemCantidad.value||0,
    checked:false
  });
}

// 📦 ITEMS
function cargarItems(){
  onSnapshot(collection(db,"listas",listaActiva,"items"),snap=>{
    items.innerHTML="";

    snap.forEach(d=>{
      const data=d.data();
      const id=d.id;
      const li=document.createElement("li");

      if(modo==="view"){
        li.innerHTML=`${data.texto} - ${data.cantidad}`;
      }
      else if(modo==="fill"){
        li.innerHTML=`
          ${data.texto}
          <input type="number" value="${data.cantidad}"
          onchange="window.editar('${id}',this.value)">
        `;
      }
      else{
        li.innerHTML=`
          ${data.texto}
          <input type="number" value="${data.cantidad}"
          onchange="window.editar('${id}',this.value)">
          <button onclick="window.borrar('${id}')">❌</button>
        `;
      }

      li.className = tipoActual==="checklist" ? "check":"lista";
      items.appendChild(li);
    });
  });
}

// ✏️
window.editar=async(id,val)=>{
  if(modo==="view") return;
  await updateDoc(doc(db,"listas",listaActiva,"items",id),{cantidad:val});
};

// 🗑
window.borrar=async(id)=>{
  if(modo!=="admin") return;
  await deleteDoc(doc(db,"listas",listaActiva,"items",id));
};

// ⏰
async function guardarHora(){
  await addDoc(collection(db,"schedules"),{
    titulo:tituloHora.value,
    hora:hora.value
  });
}

// 🔗 BOTONES
bCrear.addEventListener("click",crearLista);
bAgregar.addEventListener("click",agregarItem);
bPush.addEventListener("click",activarPush);
bGuardar.addEventListener("click",guardarHora);

btnVolver.addEventListener("click",()=>location.reload());

console.log("APP OK 🔥");

</script>

</body>
</html>
