<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario PRO V13</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
header{padding:15px;background:#1e293b;text-align:center;font-weight:bold}
.container{padding:15px}

.card{background:#1e293b;padding:12px;margin-bottom:10px;border-radius:10px}

button{padding:8px;margin:3px;border:none;border-radius:6px;background:#22c55e;cursor:pointer}
button.red{background:#ef4444}
button.blue{background:#3b82f6}

input{padding:8px;margin:3px;border-radius:6px;border:none}

.row{display:flex;gap:5px;margin:5px 0}
.row input{flex:1}
.qty{width:70px;text-align:center}

small{opacity:.7}
.qr{margin-top:10px}
</style>
</head>

<body>

<header>📦 Inventario PRO V13</header>

<div class="container">

<div id="home">
  <input id="nombreLista" placeholder="Nombre lista">
  <button onclick="crearLista()">+ Crear</button>

  <h3>Listas</h3>
  <div id="listas"></div>
</div>

<div id="view" style="display:none;"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  getDoc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0HNFfvNqjYMspNtNFgRxy2segtsRspGo",
  authDomain: "t3-2-1a478.firebaseapp.com",
  projectId: "t3-2-1a478",
  storageBucket: "t3-2-1a478.firebasestorage.app",
  messagingSenderId: "260103217483",
  appId: "1:260103217483:web:961c5bdc464067ed06c8ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let actualId=null;
let mode="creator";

// ================= FECHA =================
function getFecha(){
  let d=new Date();
  return {
    fecha:d.getTime(),
    texto:`📅 ${d.toLocaleDateString()} ⏰ ${d.toLocaleTimeString()}`
  };
}

// ================= INIT =================
function init(){

  let p=new URLSearchParams(location.search);

  actualId=p.get("id");
  mode=p.get("mode")||"creator";

  if(actualId){
    abrir(actualId);
  }else{
    cargarListas();
  }
}

// ================= CREAR =================
window.crearLista=async()=>{

  let nombre=document.getElementById("nombreLista").value;
  if(!nombre) return;

  await addDoc(collection(db,"listas"),{
    nombre,
    items:[],
    creado:getFecha().fecha
  });

  cargarListas();
};

// ================= LISTAS =================
async function cargarListas(){

  let cont=document.getElementById("listas");
  cont.innerHTML="";

  let snap=await getDocs(collection(db,"listas"));

  snap.forEach(d=>{
    let data=d.data();

    let url = `${location.origin}${location.pathname}?id=${d.id}`;

    cont.innerHTML+=`
      <div class="card">
        📋 ${data.nombre}<br>

        <button onclick="abrir('${d.id}')">Abrir</button>
        <button class="blue" onclick="share('${d.id}','fill')">✍️ Fill</button>
        <button class="blue" onclick="share('${d.id}','view')">👁 View</button>
        <button class="red" onclick="eliminar('${d.id}')">🗑</button>

        <div id="qr-${d.id}" class="qr"></div>

        <small>${new Date(data.creado).toLocaleString()}</small>
      </div>
    `;

    setTimeout(()=>{
      new QRCode(document.getElementById("qr-"+d.id),{
        text:url,
        width:100,
        height:100
      });
    },100);
  });
}

// ================= SHARE (FIX DUPLICADO + MÓVIL) =================
window.share=(id,mode)=>{

  const url = `${location.origin}${location.pathname}?id=${id}&mode=${mode}`;
  const text = `📦 Inventario PRO\n${url}`;

  // 📱 SHARE NATIVO (Android / iPhone)
  if (navigator.share) {
    navigator.share({
      title: "Inventario PRO",
      text: text,
      url: url
    }).catch(()=>{});
  } 
  // 📲 WHATSAPP FALLBACK
  else {
    window.location.href =
      "https://api.whatsapp.com/send?text=" + encodeURIComponent(text);
  }
};

// ================= ABRIR =================
window.abrir=async(id)=>{

  actualId=id;

  let snap=await getDoc(doc(db,"listas",id));
  let data=snap.data();

  document.getElementById("home").style.display="none";
  document.getElementById("view").style.display="block";

  // ================= VIEW =================
  if(mode==="view"){

    let html=`<h2>👁 ${data.nombre}</h2>`;

    let snapR=await getDocs(collection(db,"reportes"));

    snapR.forEach(r=>{
      let rep=r.data();

      if(rep.listaId!==id) return;

      html+=`<div class="card">
        <b>${rep.fechaTexto}</b><br>
      `;

      rep.items.forEach(i=>{
        html+=`${i.nombre} - ${i.cantidad}<br>`;
      });

      html+=`</div>`;
    });

    html+=`<button onclick="volver()">⬅ Volver</button>`;

    document.getElementById("view").innerHTML=html;
    return;
  }

  // ================= FILL =================
  if(mode==="fill"){

    let f=getFecha();

    let html=`<h2>✍️ ${data.nombre}</h2>

    <small>${f.texto}</small><br><br>

    <div id="fillBox"></div>

    <button onclick="guardarFill()">💾 Enviar</button>
    <button onclick="share('${id}','fill')">📤 Share</button>
    <button onclick="volver()">⬅ Volver</button>`;

    document.getElementById("view").innerHTML=html;

    let box=document.getElementById("fillBox");

    data.items.forEach(it=>{
      box.innerHTML+=`
        <div class="row">
          <input value="${it.nombre}" disabled>
          <input class="qty" placeholder="Cantidad">
        </div>
      `;
    });

    return;
  }

  // ================= CREATOR =================
  let html=`<h2>👑 ${data.nombre}</h2>

  <button onclick="agregar()">+ Item</button>
  <button onclick="share('${id}','creator')">📤 Share</button>
  <button onclick="volver()">⬅ Volver</button><hr>`;

  data.items.forEach((it,i)=>{
    html+=`
      <div class="row">
        <input value="${it.nombre}" onchange="edit(${i},this.value)">
        <input class="qty" value="${it.cantidad}" onchange="editQty(${i},this.value)">
        <button class="red" onclick="del(${i})">🗑</button>
      </div>
    `;
  });

  document.getElementById("view").innerHTML=html;
};

// ================= GUARDAR =================
window.guardarFill=async()=>{

  let rows=document.querySelectorAll("#fillBox .row");

  let items=[];

  rows.forEach(r=>{
    let i=r.querySelectorAll("input");

    items.push({
      nombre:i[0].value,
      cantidad:Number(i[1].value||0)
    });
  });

  await addDoc(collection(db,"reportes"),{
    listaId:actualId,
    fecha:getFecha().fecha,
    fechaTexto:getFecha().texto,
    items
  });

  alert("✅ Guardado");
  volver();
};

// ================= CRUD =================
window.agregar=async()=>{
  let ref=doc(db,"listas",actualId);
  let snap=await getDoc(ref);
  let d=snap.data();

  d.items.push({nombre:"",cantidad:0});
  await updateDoc(ref,{items:d.items});
  abrir(actualId);
};

window.edit=async(i,v)=>{
  let ref=doc(db,"listas",actualId);
  let snap=await getDoc(ref);
  let d=snap.data();

  d.items[i].nombre=v;
  await updateDoc(ref,{items:d.items});
};

window.editQty=async(i,v)=>{
  let ref=doc(db,"listas",actualId);
  let snap=await getDoc(ref);
  let d=snap.data();

  d.items[i].cantidad=v;
  await updateDoc(ref,{items:d.items});
};

window.del=async(i)=>{
  let ref=doc(db,"listas",actualId);
  let snap=await getDoc(ref);
  let d=snap.data();

  d.items.splice(i,1);
  await updateDoc(ref,{items:d.items});
  abrir(actualId);
};

window.eliminar=async(id)=>{
  if(!confirm("Eliminar?")) return;
  await deleteDoc(doc(db,"listas",id));
  cargarListas();
};

// ================= BACK =================
window.volver=()=>location.href=location.pathname;

// INIT
init();

</script>

</body>
</html>
