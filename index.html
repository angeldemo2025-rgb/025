<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario PRO</title>

<style>
body {
  font-family: -apple-system;
  background: #f2f2f7;
  padding: 15px;
}
h1 { text-align: center; }
.box {
  background: white;
  padding: 15px;
  border-radius: 20px;
  margin-top: 15px;
}
button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  background: black;
  color: white;
  border: none;
  margin-top: 8px;
}
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
}
li {
  background: #f9f9f9;
  padding: 10px;
  border-radius: 10px;
  margin-top: 6px;
}
</style>
</head>

<body>

<h1 id="titulo">Inventario PRO</h1>

<select id="lang">
  <option value="es">Español</option>
  <option value="en">English</option>
</select>

<div class="box">
  <h3>🔔 Notificaciones</h3>
  <button onclick="activarPush()">Activar Push</button>
</div>

<div class="box">
  <h3>📁 Crear Lista</h3>
  <input id="nombreLista" placeholder="Nombre">
  <select id="tipoLista">
    <option value="lista">Lista</option>
    <option value="checklist">Checklist</option>
  </select>
  <button onclick="crearLista()">Crear</button>
</div>

<div class="box">
  <h3>📂 Listas</h3>
  <ul id="listas"></ul>
</div>

<div class="box">
  <h3>🧾 Items</h3>
  <input id="itemTexto" placeholder="Item">
  <input id="itemCantidad" type="number" placeholder="Cantidad">
  <button onclick="agregarItem()">Agregar</button>
  <ul id="items"></ul>
</div>

<div class="box">
  <h3>⏰ Schedule</h3>
  <input id="tituloHora" placeholder="Ej: Llenar inventario">
  <input id="hora" type="time">
  <button onclick="guardarHora()">Guardar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getMessaging, getToken, onMessage
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

// 🔥 TU CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBpWDSAOYjkaJCSjpkzcIy2PuPKCLvwGWE",
  authDomain: "inventario-app-bf9af.firebaseapp.com",
  projectId: "inventario-app-bf9af",
  storageBucket: "inventario-app-bf9af.firebasestorage.app",
  messagingSenderId: "737450804732",
  appId: "1:737450804732:web:1e9ae74a1d9e8ecd2c1e79"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const messaging = getMessaging(app);

let listaActiva = null;
let tipoActual = null;

// 🔔 PUSH
window.activarPush = async () => {
  const permiso = await Notification.requestPermission();
  if (permiso !== "granted") return alert("Permiso denegado");

  const token = await getToken(messaging, {
    vapidKey: BBu_WLDUtd1L2oXJrFCPfCsVGZBcZzaX-uS7RPxs441HyJtChb1FcLTOhmOs0qAQWKv-OV01NFRBQtLG1tNIPog
  });

  console.log("TOKEN:", token);

  await addDoc(collection(db, "tokens"), { token });

  alert("Push activado 🔥");
};

// 🔔 FOREGROUND
onMessage(messaging, payload => {
  new Notification(payload.notification.title, {
    body: payload.notification.body
  });
});

// 📁 CREAR LISTA
window.crearLista = async () => {
  const nombre = nombreLista.value;
  const tipo = tipoLista.value;

  if (!nombre) return alert("Pon nombre");

  const ref = await addDoc(collection(db, "listas"), { nombre, tipo });
  listaActiva = ref.id;
};

// 📂 LISTAS
onSnapshot(collection(db, "listas"), snap => {
  listas.innerHTML = "";
  snap.forEach(docSnap => {
    const data = docSnap.data();

    const li = document.createElement("li");
    li.innerText = data.nombre;

    li.onclick = () => {
      listaActiva = docSnap.id;
      tipoActual = data.tipo;
      cargarItems();
    };

    listas.appendChild(li);
  });
});

// ➕ ITEM
window.agregarItem = async () => {
  if (!listaActiva) return alert("Selecciona lista");

  await addDoc(collection(db, "listas", listaActiva, "items"), {
    texto: itemTexto.value,
    cantidad: itemCantidad.value || 0,
    checked: false
  });
};

// 📦 ITEMS
function cargarItems() {
  onSnapshot(collection(db, "listas", listaActiva, "items"), snap => {
    items.innerHTML = "";

    snap.forEach(docSnap => {
      const d = docSnap.data();
      const id = docSnap.id;

      const li = document.createElement("li");

      if (tipoActual === "checklist") {
        li.innerHTML = `
          <input type="checkbox" ${d.checked ? "checked" : ""}
          onchange="toggle('${id}', ${d.checked})"> ${d.texto}
        `;
      } else {
        li.innerHTML = `
          ${d.texto}
          <input type="number" value="${d.cantidad}"
          onchange="editar('${id}', this.value)">
        `;
      }

      items.appendChild(li);
    });
  });
}

// ✏️ EDITAR
window.editar = async (id, val) => {
  await updateDoc(doc(db, "listas", listaActiva, "items", id), {
    cantidad: val
  });
};

// ✔️ CHECK
window.toggle = async (id, estado) => {
  await updateDoc(doc(db, "listas", listaActiva, "items", id), {
    checked: !estado
  });
};

// ⏰ SCHEDULE
window.guardarHora = async () => {
  await addDoc(collection(db, "schedules"), {
    titulo: tituloHora.value,
    hora: hora.value
  });

  alert("Guardado");
};

// 🌎 IDIOMA
const textos = {
  es: "Inventario PRO",
  en: "Inventory PRO"
};

lang.onchange = e => {
  titulo.innerText = textos[e.target.value];
};

</script>

</body>
</html>
