0<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>list>pro</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs, 
  query, 
  where 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 TU FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBpWDSAOYjkaJCSjpkzcIy2PuPKCLvwGWE",
  authDomain: "inventario-app-bf9af.firebaseapp.com",
  databaseURL: "https://inventario-app-bf9af-default-rtdb.firebaseio.com",
  projectId: "inventario-app-bf9af",
  storageBucket: "inventario-app-bf9af.firebasestorage.app",
  messagingSenderId: "737450804732",
  appId: "1:737450804732:web:1e9ae74a1d9e8ecd2c1e79"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📌 VARIABLES
let listaActiva = null;

// 📌 CREAR LISTA
window.crearLista = async () => {
  const nombre = document.getElementById("nombreLista").value.trim();
  if (!nombre) return alert("Escribe un nombre");

  const docRef = await addDoc(collection(db, "listas"), {
    nombre
  });

  document.getElementById("nombreLista").value = "";
  listaActiva = docRef.id;

  cargarListas();
};

// 📌 AGREGAR ITEM
window.agregarItem = async () => {
  if (!listaActiva) return alert("Selecciona una lista primero");

  const nombre = document.getElementById("itemNombre").value.trim();
  const cantidad = document.getElementById("itemCantidad").value.trim();

  if (!nombre || !cantidad) return alert("Llena los campos");

  await addDoc(collection(db, "items"), {
    nombre,
    cantidad,
    listaId: listaActiva
  });

  document.getElementById("itemNombre").value = "";
  document.getElementById("itemCantidad").value = "";

  cargarItems(listaActiva);
};

// 📌 CARGAR LISTAS
async function cargarListas() {
  const cont = document.getElementById("listas");
  cont.innerHTML = "";

  const snapshot = await getDocs(collection(db, "listas"));

  snapshot.forEach(doc => {
    const data = doc.data();

    const div = document.createElement("div");
    div.className = "card";
    div.innerText = data.nombre;

    div.onclick = () => {
      listaActiva = doc.id;
      cargarItems(doc.id);
    };

    cont.appendChild(div);
  });
}

// 📌 CARGAR ITEMS
async function cargarItems(listaId) {
  const cont = document.getElementById("items");
  cont.innerHTML = "";

  const q = query(collection(db, "items"), where("listaId", "==", listaId));
  const snapshot = await getDocs(q);

  snapshot.forEach(doc => {
    const data = doc.data();

    const div = document.createElement("div");
    div.className = "item";
    div.innerText = `${data.nombre} - ${data.cantidad}`;

    cont.appendChild(div);
  });
}

// INIT
window.onload = () => {
  cargarListas();
};

</script>

<style>
body {
  margin: 0;
  font-family: -android-system, BlinkMacSystemFont;
  background: #f2f4f7;
}

.container {
  padding: 15px;
}

h2 {
  margin-top: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: black;
  color: white;
  font-size: 16px;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 10px;
  border-radius: 12px;
  cursor: pointer;
}

.item {
  background: #fff;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="container">

<h2>Crear Lista</h2>
<input id="nombreLista" placeholder="Nombre de la lista">
<button onclick="crearLista()">Crear</button>

<h2>Listas</h2>
<div id="listas"></div>

<h2>Items</h2>
<input id="itemNombre" placeholder="Nombre del item">
<input id="itemCantidad" placeholder="Cantidad">
<button onclick="agregarItem()">Agregar</button>

<div id="items"></div>

</div>

</body>
</html>
